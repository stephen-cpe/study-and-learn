{% extends "base.html" %}
{% block title %}Log In — Study-and-Learn{% endblock %}

{% block content %}
<div class="fb-layout-container">
    <div class="fb-hero-col">
        <img src="{{ url_for('static', filename='images/main.png') }}" alt="Study-and-Learn Hero" class="hero-image">
        <p class="hero-tagline">
            Study-and-Learn helps you convert uploaded materials into structured, interactive study paths.
        </p>
    </div>

    <div class="fb-auth-col">
        <h1 class="mt-4">Log In</h1>
        <div class="auth-card">
            <form action="{{ url_for('main.login') }}" method="POST">
                <div class="mb-3">
                    <input type="text" class="form-control form-control-lg" name="username"
                           placeholder="Username" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control form-control-lg" name="password"
                           placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Log In</button>
            </form>

            <div class="auth-divider"></div>

            <a href="{{ url_for('main.signup') }}" class="btn btn-success btn-lg w-100">
                Create New Account
            </a>
        </div>
    </div>
</div>
{% endblock %}
