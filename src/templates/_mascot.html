<div class="mascot-wrapper" data-mascot-state="idle">
    <img id="robot-mascot"
         class="mascot-img mascot-state-idle"
        src="{{ url_for('static', filename='images/mascots/idle/mascot-idle.gif') }}"
        data-idle-src="{{ url_for('static', filename='images/mascots/idle/mascot-idle.gif') }}"
        data-busy-src="{{ url_for('static', filename='images/mascots/busy/mascot-busy.gif') }}"
        data-happy-src="{{ url_for('static', filename='images/mascots/happy/mascot-happy.gif') }}"
        data-error-src="{{ url_for('static', filename='images/mascots/error/mascot-error.gif') }}"
        data-fallback-src="{{ url_for('static', filename='images/mascots/mascot-robot.png') }}"
         alt="Study Robot Mascot"
         onclick="window._mascotTalk &amp;&amp; window._mascotTalk()">
    <div id="speech-bubble">
        <span id="bubble-text">Booting neural link...</span>
        <div id="bubble-progress" class="bubble-progress" style="display:none;">
            <div class="bubble-progress-track"><div class="bubble-progress-fill" id="bubble-progress-fill"></div></div>
        </div>
        <div class="bubble-tail" aria-hidden="true"></div>
    </div>
</div>
