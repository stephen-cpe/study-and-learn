{% extends "base.html" %}
{% block title %}Reset Password — Study-and-Learn{% endblock %}

{% block content %}
<div class="form-section" style="max-width: 480px; margin: 2rem auto;">
    <h2 class="section-title mb-4 text-center">Reset Your Password</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="new_password" class="form-label">New Password</label>
            <input type="password" class="form-control form-control-lg" id="new_password"
                   name="new_password" placeholder="Enter new password" minlength="6" required>
            <div class="form-text">Must be at least 6 characters.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">Update Password</button>
    </form>
    <div class="text-center mt-3">
        <a href="{{ url_for('main.index') }}" class="btn btn-outline-primary btn-sm">Back to Home</a>
    </div>
</div>
{% endblock %}
